spring:
#  数据库
  datasource:
    url: jdbc:mysql://localhost:3306/chatting?useUnicode=true&characterEncoding=utf-8
    username: root
    password: 123456
    driver-class-name: com.mysql.jdbc.Driver
#    控制器追踪页面
  thymeleaf:
    cache: false
    encoding: UTF-8 # 模板编码
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML5
  mvc:
    static-path-pattern: /static/**
#        mybatis
mybatis:
    mapper-locations: classpath:mapper/*.xml  #对应mapper映射xml文件所在路径
    type-aliases-package: com.example.chatting_in_web.entity  #对应实体类路径