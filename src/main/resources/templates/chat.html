<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://apps.bdimg.com/libs/jquery/2.1.4/jquery.min.js"></script>
    <title>简易聊天窗口</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        .chat-box {
            width: 600px;
            height: 500px;
            border: 1px solid #ddd;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            background-color: #f9f9f9;
        }

        .input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
        }

        #msg-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            outline: none;
        }

        #send-btn {
            margin-left: 10px;
            padding: 8px 16px;
            background-color: #0084ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        #send-btn:hover {
            background-color: #0073e6;
        }
    </style>
</head>
<body>
<div class="chat-box">
    <div class="messages" id="messages">
        <div id="chatContent" style="width:100%; height:400px; overflow-y:auto; border:1px solid #e89595; border-radius:10px; background:lightcyan;">
            <ul id="contentUl" style="list-style-type:none; padding:0; margin:0;">

            </ul>
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="输入消息">
        <input type="button" id="send-btn" value="发送" onclick="get()"/>
    </div>
</div>

<script>

    const username = getCookie("username");
    console.log(username);
    function getCookie(Cname){
        const name = Cname + "=";
        const ca = document.cookie.split(";");
        for(var i=0;i<ca.length;i++) {
            var c = ca[i].trim();

            if(c.indexOf(name) == 0){
                return c.substring(name.length,c.length);
            }
        }
    }


    let websocket;

    if("WebSocket" in window) {
        websocket = new WebSocket("ws://localhost:8080/websocket");
    }else{
        alert("您的浏览器不支持websocket")
    }

    websocket.onopen = function () {

    }

    websocket.onmessage = function (event) {
        const data = JSON.parse(event.data);
        console.log(data);
        if (data.username != username){
            $("#contentUl").append(
                "<li style='clear:both; padding: 10px;'>" +
                "<span style='display:block; margin:10px 0; padding:10px; background:#5be095; border-radius:10px; max-width:60%; word-break: break-all; float:left;'>" +
                "<em>"+data.username+":</em> " + data.message +
                "</span>" +
                "</li>"
            );
        }
    }

    websocket.onclose = function () {

    }

    websocket.onerror = function () {

    }

    function get() {
        // const message = $("#msg-input").val();
        const message = document.getElementById("msg-input").value;
        if (message === ""){
            alert("请输入内容");
            return;
        }else{
                const data = {};
                data["message"] = message;
                data["username"] = username;
                $("#contentUl").append(
                    "<li style='clear:both; padding: 10px;'>" +
                    "<span style='display:block; margin:10px 0; padding:10px; background:#5be095; border-radius:10px; max-width:60%; word-break: break-all; float:right;'>" +
                    "<em></em> " + data.message +
                    "</span>" +
                    "</li>"
            );
            console.log(data.username);
            websocket.send(JSON.stringify(data));
            $("#msg-input").val("");
        }
    }
</script>
</body>
</html>
