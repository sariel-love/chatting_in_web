<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://apps.bdimg.com/libs/jquery/2.1.4/jquery.min.js"></script>
    <title>聊天窗口</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }
        .chat-box {
            width: 800px;
            height: 500px;
            margin: 20px auto;
            border: 1px solid #ccc;
            display: flex;
            overflow: hidden;
        }
        /* 左侧列表 */
        .list-box {
            width: 200px;
            height: 100%;
            border-right: 1px solid #ccc;
            display: flex;
            flex-direction: column;
        }
        .list-box .item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border-bottom: 1px solid #eee;
        }
        .list-box .item:last-child {
            border-bottom: none;
        }

        /* 右侧聊天区域 */
        .chatting{
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            background: #fdfdfd;
        }
        #chatContent{
            width: 100%;
            height: 100%;
            padding: 10px;
            background: #f8fbfc;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
            overflow-y: auto;
        }
        #contentUl{
            list-style: none;
        }

        /* 输入框区域 */
        .input-area {
            display: flex;
            padding: 10px;
            gap: 8px;
            border-top: 1px solid #eee;
        }
        #msg-input {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            outline: none;
        }
        #send-btn {
            padding: 8px 16px;
            background-color: #0084ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #send-btn:hover {
            background-color: #0073e6;
        }
        a{
            text-decoration: none;
            font-size: 20px;
        }
        a:hover{
            color: whitesmoke;
        }
        .item{
            background-color: #3399ff;
        }
    </style>
</head>
<body>
<div class="chat-box">
    <div class="list-box">
        <div class="item"><a>all</a></div>
        <div class="item"><a href = "/login/aichat">deepseek</a></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
    </div>
    <div class="chatting">
        <div class="messages" id="messages">
            <div id="chatContent">
                <ul id="contentUl"></ul>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="输入消息">
            <input type="button" id="send-btn" value="发送" onclick="get()">
        </div>
    </div>
</div>

<script>
    const sendByBtn = document.getElementById("msg-input");
    const username = getCookie("username");
    console.log(username);
    function getCookie(Cname){
        const name = Cname + "=";
        const ca = document.cookie.split(";");
        for(var i=0;i<ca.length;i++) {
            var c = ca[i].trim();

            if(c.indexOf(name) == 0){
                return c.substring(name.length,c.length);
            }
        }
    }


    let websocket;

    if("WebSocket" in window) {
        websocket = new WebSocket("ws://localhost:8080/websocket");
    }else{
        alert("您的浏览器不支持websocket")
    }

    websocket.onopen = function () {

    }

    websocket.onmessage = function (event) {
        const data = JSON.parse(event.data);
        console.log(data);
        if (data.username != username){
            $("#contentUl").append(
                "<li style='clear:both; padding: 15px 10px 10px 10px; position: relative;'>" +
                "<em style='position: absolute; top: 1px; left: 16px; font-size: 0.33em; font-style: normal;'>" + data.username + "</em>" +
                "<span style='display:block; margin:5px 5px 5px 5px; padding:0px 5px 5px 5px; background:#5be095; border-radius:10px; max-width:60%; word-break: break-all; float:left;'>" +
                "<span style='display: block;'>" + data.message + "</span>" +
                "</span>" +
                "</li>"
            );
        }
    }

    websocket.onclose = function () {

    }

    websocket.onerror = function () {

    }

    function get() {
        // const message = $("#msg-input").val();
        const message = document.getElementById("msg-input").value;
        if (message === ""){
            alert("请输入内容");
            return;
        }else{
            const data = {};
            data["message"] = message;
            data["toUser"] = "all"
            data["username"] = username;
            $("#contentUl").append(
                "<li style='clear:both; padding: 15px 10px 10px 10px; position: relative;'>" +
                "<span style='display:block; margin:5px 5px 5px 5px; padding:0px 5px 5px 5px; background:#5be095; border-radius:10px; max-width:60%; word-break: break-all; float:right;'>" +
                "<span style='display: block;'>" + data.message + "</span>" +
                "</span>" +
                "</li>"
            );
            console.log(data.username);
            websocket.send(JSON.stringify(data));
            document.getElementById("msg-input").value = "";
        }
    }
    sendByBtn.addEventListener("keydown",(event)=>{
        if(event.key === "Enter"){
            get();
        }
    });
</script>
</body>
</html>
