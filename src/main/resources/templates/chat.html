<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易聊天窗口</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        .chat-box {
            width: 600px;
            height: 500px;
            border: 1px solid #ddd;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            background-color: #f9f9f9;
        }

        .input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
        }

        #msg-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            outline: none;
        }

        #send-btn {
            margin-left: 10px;
            padding: 8px 16px;
            background-color: #0084ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        #send-btn:hover {
            background-color: #0073e6;
        }
    </style>
</head>
<body>
<div class="chat-box">
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="输入消息">
        <button id="send-btn">发送</button>
    </div>
</div>

<script>

</script>
</body>
</html>
